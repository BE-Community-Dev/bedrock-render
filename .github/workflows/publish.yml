name: Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    name: Publish crate
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0
          components: clippy, rustfmt
      - name: Verify tag matches crate version
        run: |
          version="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n 1)"
          tag="${GITHUB_REF_NAME#v}"
          if [ "$version" != "$tag" ]; then
            echo "tag v$tag does not match crate version $version" >&2
            exit 1
          fi
      - name: Wait for bedrock-leveldb release
        run: |
          version="$(sed -n 's/^bedrock-leveldb = { version = "\([^"]*\)".*/\1/p' Cargo.toml | head -n 1)"
          for attempt in $(seq 1 30); do
            if cargo info "bedrock-leveldb@$version" >/dev/null 2>&1; then
              cargo info "bedrock-leveldb@$version"
              exit 0
            fi
            echo "bedrock-leveldb $version not resolvable from crates.io yet; attempt $attempt/30"
            sleep 20
          done
          echo "bedrock-leveldb $version is not resolvable from crates.io" >&2
          exit 1
      - name: Wait for bedrock-world release
        run: |
          version="$(sed -n 's/^bedrock-world = { version = "\([^"]*\)".*/\1/p' Cargo.toml | head -n 1)"
          for attempt in $(seq 1 30); do
            if cargo info "bedrock-world@$version" >/dev/null 2>&1; then
              cargo info "bedrock-world@$version"
              exit 0
            fi
            echo "bedrock-world $version not resolvable from crates.io yet; attempt $attempt/30"
            sleep 20
          done
          echo "bedrock-world $version is not resolvable from crates.io" >&2
          exit 1
      - name: Use published Bedrock crate dependencies
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          manifest = Path("Cargo.toml")
          text = manifest.read_text()
          text = re.sub(
              r'(bedrock-leveldb = \{ version = "[^"]+", )path = "\.\./bedrock-leveldb", ',
              r'\1',
              text,
          )
          text = re.sub(
              r'(bedrock-world = \{ version = "[^"]+", )path = "\.\./bedrock-world", ',
              r'\1',
              text,
          )
          manifest.write_text(text)
          PY
      - name: Format
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Test default features
        run: cargo test
      - name: Test no default features
        run: cargo test --no-default-features
      - name: Test feature matrix
        run: |
          cargo test --no-default-features --features async
          cargo test --no-default-features --features webp
          cargo test --no-default-features --features png
      - name: Docs
        run: cargo doc --no-deps
      - name: Dry run
        run: cargo publish --dry-run --allow-dirty
      - name: Publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --no-verify --allow-dirty
